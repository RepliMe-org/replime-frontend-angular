<div class="max-w-2xl mx-auto text-center">
  <div class="persona-icon">
    <i class="fa-solid fa-robot text-5xl text-cyan"></i>
  </div>

  <h1 class="persona-title">
    Shape Your <span class="gradient-text">AI Persona</span>
  </h1>

  <p class="persona-subtitle">
    Give your chatbot a name and choose a personality that matches your content
    style.
  </p>

  <app-card variant="default">
    <div class="form-group">
      <label class="form-label"> Bot Name </label>

      <input
        type="text"
        name="chatbotName"
        [(ngModel)]="chatbotName"
        placeholder="e.g. YourChannel AI, Ask YourChannel"
        class="form-input"
      />

      <p class="form-help">
        This is how your chatbot will be presented to your audience.
      </p>
    </div>

    <div class="form-group">
      <label class="form-label mb-4"> Personality Style </label>

      <div class="personality-grid">
        <button
          *ngFor="let option of personalityOptions"
          type="button"
          (click)="selectPersonality(option.id)"
          [class.selected]="selectedPersonality === option.id"
          class="personality-card"
        >
          <div class="personality-card-content">
            <div class="personality-icon-wrapper">
              <i [class]="'fa-solid ' + option.icon + ' text-lg'"></i>
            </div>

            <div class="personality-text">
              <h3 class="personality-title">
                {{ option.label }}
              </h3>

              <p class="personality-description">
                {{ option.description }}
              </p>
            </div>
          </div>
        </button>
      </div>
    </div>

    <app-button
      class="w-full"
      size="lg"
      [disabled]="!isFormValid()"
      (click)="onContinue()"
    >
      <span class="font-semibold">Continue</span>
      <i class="fa-solid fa-arrow-right"></i>
    </app-button>
  </app-card>
</div>
