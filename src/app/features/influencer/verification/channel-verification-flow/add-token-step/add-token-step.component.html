<div class="add-token">
  <div class="add-token-icon">
    <i class="fa-solid fa-shield add-token-icon-i"></i>
  </div>

  <h1 class="add-token-title">Add Verification Token</h1>

  <p class="add-token-subtitle">
    Copy this unique token and add it anywhere in your YouTube channel's "About"
    description to prove ownership.
  </p>

  <app-card variant="default">
    <div class="channel-card">
      <div class="channel-card-icon">
        <i class="fa-brands fa-youtube channel-card-icon-i"></i>
      </div>

      <div class="channel-card-info">
        <p class="channel-card-handle">
          {{ channelHandle }}
        </p>
        <p class="channel-card-url">{{ channelUrl }}</p>
      </div>
    </div>

    <div class="token-field">
      <label class="token-field-label">
        Your Verification Token
      </label>

      <div class="token-field-input-wrapper">
        <input
          type="text"
          [value]="verificationToken"
          readonly
          class="token-field-input"
        />

        <button
          (click)="copyToken()"
          class="token-field-copy-btn"
          [title]="tokenCopied ? 'Copied!' : 'Copy token'"
        >
          <i *ngIf="!tokenCopied" class="fa-solid fa-copy"></i>
          <i *ngIf="tokenCopied" class="fa-solid fa-check"></i>
        </button>
      </div>
    </div>

    <div *ngIf="expirationDate" class="expiration-warning">
      <i class="fa-solid fa-clock expiration-warning-icon"></i>
      <p class="expiration-warning-text">
        Token expires on <strong>{{ getFormattedExpirationDate() }}</strong>
      </p>
    </div>

    <div class="instructions">
      <div
        *ngFor="let instruction of instructions; let i = index"
        class="instruction-item"
      >
        <div class="instruction-item-number">
          {{ i + 1 }}
        </div>
        <div class="instruction-item-text">
          {{ instruction.title }}
        </div>
      </div>
    </div>

    <div class="actions">
      <app-button (click)="onTokenAdded()" class="actions-primary" size="lg">
        <span class="actions-primary-text">I've Added the Token</span>
        <i class="fa-solid fa-arrow-right actions-primary-text"></i>
      </app-button>
    </div>
  </app-card>
</div>
