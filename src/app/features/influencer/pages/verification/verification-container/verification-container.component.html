<app-step-page
  [steps]="state === 'CHATBOT_SETUP' ? chatbotSteps : verificationSteps"
  [activeStepIndex]="currentStep"
  [errorMessage]="errorMessage"
  (errorDismissed)="errorMessage = ''"
>
  <div *ngIf="state === 'CHANNEL_VERIFICATION'">
    <!-- Step 0 -->
    <app-verify-channel-step
      *ngIf="currentStep === 0"
      [isLoading]="isLoading"
      (channelSubmit)="onChannelSubmit($event)"
    ></app-verify-channel-step>

    <!-- Step 1 -->
    <app-add-token-step
      *ngIf="currentStep === 1"
      [channelUrl]="channelUrl"
      [verificationToken]="verificationToken"
      [expirationDate]="expirationDate"
      (tokenAdded)="onTokenAdded()"
      (back)="onBack()"
    ></app-add-token-step>

    <!-- Step 2 -->
    <app-ready-verify-step
      *ngIf="currentStep === 2"
      [channelUrl]="channelUrl"
      [verificationToken]="verificationToken"
      [isVerifying]="isVerifying"
      (verify)="onVerificationStart()"
      (back)="onBack()"
      (startOver)="onStartOver()"
    ></app-ready-verify-step>

    <!-- Step 3 -->
    <app-verification-complete-step
      *ngIf="currentStep === 3"
      [channelUrl]="channelUrl"
      (complete)="onCompleteChannelVerification()"
    ></app-verification-complete-step>
  </div>

  <div *ngIf="state === 'CHATBOT_SETUP'">
    <!-- Step 0 -->
    <app-persona-setup-step
      *ngIf="currentStep === 0"
      [personaData]="chatbotConfig.personaData"
      (personaSubmit)="onPersonaSubmit($event)"
    ></app-persona-setup-step>

    <!-- Step 1 -->
    <app-welcome-message-step
      *ngIf="currentStep === 1"
      [chatbotName]="chatbotConfig.personaData.name"
      (welcomeMessageSubmit)="onWelcomeMessageSubmit($event)"
      (back)="onBack()"
    ></app-welcome-message-step>

    <!-- Step 2 -->
    <app-category-selection-step
      *ngIf="currentStep === 2"
      [selectedCategory]="chatbotConfig.category ? +chatbotConfig.category : null"
      (categorySubmit)="onCategorySubmit($event)"
      (back)="onBack()"
    ></app-category-selection-step>

    <!-- Step 3 -->
    <app-message-classification-step
      *ngIf="currentStep === 3"
      [selectedSystemIds]="chatbotConfig.systemClassIds"
      [selectedCustomNames]="chatbotConfig.customClassNames"
      [category]="chatbotConfig.category ? +chatbotConfig.category : null"
      (classificationsSubmit)="onClassificationsSubmit($event)"
      (back)="onBack()"
    ></app-message-classification-step>

    <!-- Step 4 -->
    <app-chatbot-review-step
      *ngIf="currentStep === 4"
      [personaData]="chatbotConfig.personaData"
      [welcomeMessage]="chatbotConfig.welcomeMessage"
      [categoryName]="selectedCategoryName"
      [systemClassNames]="selectedSystemClassNames"
      [customClassNames]="chatbotConfig.customClassNames"
      [isSaving]="isSavingConfig"
      (confirm)="onConfirmSetup()"
      (back)="onBack()"
      (editStep)="onEditStep($event)"
    ></app-chatbot-review-step>
  </div>
</app-step-page>
