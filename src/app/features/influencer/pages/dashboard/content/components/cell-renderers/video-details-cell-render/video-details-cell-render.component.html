<div class="flex flex-col justify-center h-full gap-1">
  <span class="text-sm font-semibold truncate" style="color: var(--page-text)">
    {{ title }}
  </span>

  <a
    [href]="youtubeUrl"
    target="_blank"
    rel="noopener noreferrer"
    class="flex items-center gap-1.5 text-xs truncate hover:underline"
    style="color: var(--primary)"
    (click)="$event.stopPropagation()"
  >
    <i class="fa-solid fa-link text-[10px]"></i>
    {{ youtubeUrl }}
  </a>

  <span class="text-xs" style="color: var(--subtle-text)">
    {{ duration }}
  </span>
</div>
