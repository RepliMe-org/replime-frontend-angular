<div class="flex items-center justify-start h-full pr-1">
  <span
    *ngIf="config"
    class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-medium"
    [style.color]="config.color"
    [style.background]="config.bg"
  >
    <i [class]="config.icon"></i>
    {{ config.label }}
  </span>

  <i
    *ngIf="failureReason"
    class="fa-solid fa-circle-info text-xs ml-1.5 cursor-help"
    style="color: var(--subtle-text)"
    [title]="failureReason"
  ></i>
</div>
