<app-dashboard-page>
  <app-dashboard-header
    title="Learning Sources"
    subtitle="Track and manage the videos and playlists your chatbot learns from."
  >
    <app-button
      variant="outline"
      size="default"
      (click)="openModal('PLAYLIST')"
    >
      <i class="fa-solid fa-list"></i>
      Add Playlist
    </app-button>
    <app-button size="default" (click)="openModal('VIDEO')">
      <i class="fa-solid fa-plus"></i>
      Add Video
    </app-button>
  </app-dashboard-header>

  <app-data-grid
    *ngIf="rowData.length > 0"
    [rowData]="rowData"
    [columnDefs]="columnDefs"
    [context]="gridContext"
    (gridReady)="onGridReady($event)"
  ></app-data-grid>

  <app-empty-state
    *ngIf="rowData.length === 0"
    iconClass="fa-solid fa-plus"
    title="No sources found"
    description="Add a YouTube video or playlist to get started."
  >
    <app-button variant="default" size="default" (click)="openModal('VIDEO')">
      Add Video
    </app-button>
  </app-empty-state>

  <app-add-source-modal
    [show]="showModal"
    [mode]="modalMode"
    [isLoading]="isSubmitting"
    (closeModal)="showModal = false"
    (submitSource)="onSubmit($event)"
  />
</app-dashboard-page>
