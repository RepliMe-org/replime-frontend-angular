<app-verification-container
  *ngIf="dashboardState !== 'DASHBOARD'"
  [state]="dashboardState">
</app-verification-container>

<div *ngIf="dashboardState === 'DASHBOARD'" class="p-6">
  <h1>
    Welcome to Your Influencer Dashboard
  </h1>
  <p class="text-subtle-text">
    Your channel has been verified! You can now access all influencer features.
  </p>
</div>
