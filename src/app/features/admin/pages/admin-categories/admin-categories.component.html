<app-dashboard-page>
  <app-dashboard-header title="Categories" subtitle="Manage content categories">
    <app-button (click)="openAddForm()" [disabled]="formState.showAddForm">
      <i class="fa-solid fa-plus text-xs"></i> Add Categories
    </app-button>
  </app-dashboard-header>
  <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
    <app-stat-card
      [value]="categories.length"
      label="Total Categories"
      iconClass="fa-solid fa-folder-tree"
      iconColorClass="text-primary bg-primary/20"
    />
  </div>

  <app-card>
    <app-search-input
      [fullWidth]="true"
      placeholder="Search categories..."
      [value]="searchQuery"
      (valueChange)="onSearchChange($event)"
    ></app-search-input>
  </app-card>

  <app-form-card
    *ngIf="formState.showAddForm"
    title="Add Categories"
    [errorMessage]="formState.formError"
    [saving]="formState.saving"
    (save)="saveNewCategories()"
    (cancel)="discardAddForm()"
  >
    <app-dynamic-input-list
      [items]="formState.newItems"
      [duplicateItemFlags]="formState.duplicateItemFlags"
      [existingItemFlags]="formState.existingItemFlags"
      [triggerValidation]="formState.triggerListValidation"
      placeholder="Category name"
      existingItemMessage="Already exists"
      (itemsChange)="onCategoryItemsChanged($event)"
    />
  </app-form-card>

  <app-empty-state
    *ngIf="loading || filteredCategories.length === 0"
    [isLoading]="loading"
    loadingMessage="Loading categories…"
    iconClass="fa-solid fa-folder-open"
    title="No categories yet"
    description="Create your first category to get started."
  >
    <app-button (click)="openAddForm()" [disabled]="formState.showAddForm">
      <i class="fa-solid fa-plus text-xs"></i> Add Categories
    </app-button>
  </app-empty-state>

  <div *ngIf="!loading" class="category-list">
    <div *ngFor="let category of filteredCategories; trackBy: trackByCategoryId" class="category-item">
      <i
        class="fa-solid fa-folder-tree text-primary text-sm w-4 text-center shrink-0"
      ></i>
      <span class="category-name">{{ category.name }}</span>
      <button
        class="delete-btn"
        title="Delete"
        (click)="deleteCategory(category)"
      >
        <i class="fa-solid fa-trash text-xs"></i>
      </button>
    </div>
  </div>
</app-dashboard-page>
