<app-dashboard-page>
  <app-dashboard-header
    title="Chatbot Management"
    subtitle="Review, verify, and manage creator chatbots"
  >
  </app-dashboard-header>

  <app-chatbot-stats
    [total]="totalChatbots"
    [active]="activeChatbots"
    [training]="pendingChatbots"
    [failed]="failedChatbots"
  ></app-chatbot-stats>

  <app-chatbot-filters
    [searchQuery]="searchQuery"
    [activeFilter]="activeFilter"
    (searchChange)="onSearchChange($event)"
    (filterChange)="setFilter($event)"
  ></app-chatbot-filters>

  <app-empty-state
    *ngIf="loading || filteredChatbots.length === 0"
    [isLoading]="loading"
    loadingMessage="Loading chatbots…"
    iconClass="fa-solid fa-robot"
    title="No chatbots found"
    description="No chatbots match your current filters."
  ></app-empty-state>

  <div *ngIf="!loading && filteredChatbots.length > 0" class="chatbot-grid">
    <app-admin-chatbot-card
      *ngFor="let bot of filteredChatbots; trackBy: trackById"
      [bot]="bot"
      (visibilityToggle)="toggleVisibility($event)"
      (deleteChatbot)="requestDelete($event)"
    ></app-admin-chatbot-card>
  </div>

  <app-modal
    [show]="showDeleteModal"
    title="Delete Chatbot"
    maxWidth="max-w-md"
    (closeModal)="cancelDelete()"
  >
    <div modal-body *ngIf="botPendingDelete">
      <p class="delete-modal-text">
        This will permanently remove
        <strong>{{ botPendingDelete.chatbotName }}</strong>
        and all related data, and demote
        <strong>{{ botPendingDelete.influencerUsername }}</strong>
        to a normal user.
      </p>
      <p class="delete-modal-warning">This action cannot be undone.</p>
    </div>

    <div style="display: flex;" modal-footer>
      <app-button
        variant="secondary"
        [disabled]="deleteInProgress"
        (click)="cancelDelete()"
      >
        Cancel
      </app-button>

      <app-button
        variant="danger"
        [disabled]="deleteInProgress"
        (click)="confirmDelete()"
      >
        Delete
      </app-button>
    </div>
  </app-modal>
</app-dashboard-page>
