<div class="user-cell">
  <img *ngIf="avatarUrl" [src]="avatarUrl" alt="" class="user-avatar" />
  <div *ngIf="!avatarUrl" class="user-avatar user-avatar--fallback">
    {{ initials }}
  </div>
  <div class="user-info">
    <span class="user-name">{{ username }}</span>
    <span class="user-email">{{ email }}</span>
  </div>
</div>
