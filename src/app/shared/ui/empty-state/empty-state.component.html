<div class="empty-state">
  <ng-container *ngIf="isLoading; else emptyTemplate">
    <app-loader [message]="loadingMessage"></app-loader>
  </ng-container>

  <ng-template #emptyTemplate>
    <div *ngIf="iconClass" class="empty-icon">
      <i [class]="iconClass"></i>
    </div>
    <p class="empty-title">{{ title }}</p>
    <p *ngIf="description" class="empty-desc">{{ description }}</p>
    
    <div>
      <ng-content></ng-content>
    </div>
  </ng-template>
</div>
