<div class="dashboard-search-wrapper" [class.!w-full]="fullWidth">
  <i class="fa-solid fa-magnifying-glass dashboard-search-icon"></i>
  <input
    type="text"
    class="form-input"
    style="padding-left: 40px"
    [placeholder]="placeholder"
    [ngModel]="value"
    (ngModelChange)="onModelChange($event)"
  />
</div>
