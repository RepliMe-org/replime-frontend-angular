<div class="toast-container" aria-live="polite" aria-atomic="true">
  <div
    *ngFor="let toast of toasts; trackBy: trackById"
    class="toast"
    [class.toast-success]="toast.type === 'success'"
    [class.toast-error]="toast.type === 'error'"
    role="alert"
  >
    <div class="toast-icon">
      <i *ngIf="toast.type === 'success'" class="fa fa-check-circle"></i>
      <i *ngIf="toast.type === 'error'" class="fa fa-exclamation-circle"></i>
    </div>

    <span class="toast-message">{{ toast.message }}</span>

    <button class="toast-close" (click)="dismiss(toast.id)" aria-label="Dismiss">
      <i class="fa fa-times"></i>
    </button>
  </div>
</div>
